<!doctype html>
<html ⚡ lang="en">
  <head>
    <meta charset="utf-8">
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    <script async custom-element="amp-story" src="https://cdn.ampproject.org/v0/amp-story-1.0.js"></script>
    <script async custom-element="amp-story-bookend" src="https://cdn.ampproject.org/v0/amp-story-bookend-0.1.js"></script>
    <script async custom-element="amp-story-auto-ads" src="https://cdn.ampproject.org/v0/amp-story-auto-ads-0.1.js"></script>
    <script async custom-element="amp-video" src="https://cdn.ampproject.org/v0/amp-video-0.1.js"></script>
    <script async custom-element="amp-story-interactive" src="https://cdn.ampproject.org/v0/amp-story-interactive-0.1.js"></script>
    <script async custom-element="amp-story-page-outlink" src="https://cdn.ampproject.org/v0/amp-story-page-outlink-0.1.js"></script>
    <link rel="canonical" href="https://example.com/mountain-story.html">
    <meta name="viewport" content="width=device-width">
    <style amp-boilerplate>
body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}
    </style>
    <noscript>
      <style amp-boilerplate>
body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}
      </style>
    </noscript>
    <title>Mountains in Autumn</title>
    <style amp-custom>

            h1, h2, h3 { font-family: Georgia, serif; color: #fff; }
            p { color: rgba(255,255,255,0.9); }
        
    </style>
    <script type="application/ld+json">
{"@context": "https://schema.org", "@type": "NewsArticle", "headline": "Mountains in Autumn", "publisher": {"@type": "Organization", "name": "Example Media", "logo": {"@type": "ImageObject", "url": "https://example.com/logo.png"}}}
    </script>
  </head>
  <body>
    <amp-story standalone title="Mountains in Autumn" publisher="Example Media" publisher-logo-src="https://example.com/logo.png" poster-portrait-src="https://example.com/poster.jpg" poster-square-src="https://example.com/poster-square.jpg" supports-landscape>
      <amp-story-auto-ads>
        <script type="application/json">
{
  "ad-attributes": {
    "src": "https://ad-server.example.com/endpoint",
    "type": "adsense"
  }
}
        </script>
      </amp-story-auto-ads>
      <amp-story-page id="cover" auto-advance-after="8s">
        <amp-story-grid-layer template="fill">
          <amp-img src="https://example.com/hero.jpg" width="900" height="1600" alt="Mountain at dusk" layout="fill"></amp-img>
        </amp-story-grid-layer>
        <amp-story-grid-layer template="vertical">
          <h1 animate-in="fly-in-bottom" animate-in-duration="0.5s">Mountains in Autumn</h1>
          <p animate-in="fade-in" animate-in-delay="0.4s">A visual journey through the peaks.</p>
        </amp-story-grid-layer>
      </amp-story-page>
      <amp-story-page id="video">
        <amp-story-grid-layer template="fill">
          <amp-video width="900" height="1600" layout="fill" poster="https://example.com/clip-poster.jpg" loop autoplay muted>
            <source src="https://example.com/clip.mp4" type="video/mp4">
            <source src="https://example.com/clip.webm" type="video/webm">
          </amp-video>
        </amp-story-grid-layer>
        <amp-story-grid-layer template="vertical">
          <h2 animate-in="fade-in">Hidden Valleys</h2>
        </amp-story-grid-layer>
      </amp-story-page>
      <amp-story-page id="poll">
        <amp-story-grid-layer template="fill">
          <amp-img src="https://example.com/trail.jpg" width="900" height="1600" alt="Hiking trail" layout="fill"></amp-img>
        </amp-story-grid-layer>
        <amp-story-grid-layer template="vertical">
          <h3>Quick question</h3>
          <amp-story-interactive-poll id="season-poll" option-1-text="Spring" option-2-text="Summer" option-3-text="Autumn" option-4-text="Winter"></amp-story-interactive-poll>
        </amp-story-grid-layer>
      </amp-story-page>
      <amp-story-page id="cta">
        <amp-story-grid-layer template="fill">
          <amp-img src="https://example.com/valley.jpg" width="900" height="1600" alt="Green valley" layout="fill"></amp-img>
        </amp-story-grid-layer>
        <amp-story-grid-layer template="vertical">
          <h2>Plan your trip</h2>
          <p>Discover routes less traveled.</p>
        </amp-story-grid-layer>
        <amp-story-page-outlink layout="nodisplay" theme="dark" cta-text="Explore Trails">
          <a href="https://example.com/trails">Explore Trails</a>
        </amp-story-page-outlink>
      </amp-story-page>
      <amp-story-bookend layout="nodisplay">
        <script type="application/json">
{
  "bookendVersion": "v1.0",
  "shareProviders": [
    "twitter",
    {
      "provider": "facebook",
      "app_id": "my-app-id"
    }
  ],
  "components": [
    {
      "type": "heading",
      "text": "More Stories"
    },
    {
      "type": "small",
      "title": "Winter in the Alps",
      "url": "https://example.com/winter",
      "image": "https://example.com/winter-thumb.jpg"
    },
    {
      "type": "cta-link",
      "title": "Subscribe to our newsletter",
      "url": "https://example.com/subscribe"
    },
    {
      "type": "small",
      "title": "Spring in the Alps",
      "url": "https://example.com/spring"
    }
  ]
}
        </script>
      </amp-story-bookend>
    </amp-story>
  </body>
</html>
